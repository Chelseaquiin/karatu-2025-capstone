name: Deploy Retail App to EKS

on:
  workflow_dispatch:

jobs:
  deploy-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - uses: azure/setup-helm@v4

      - name: Install helmfile
        run: |
          curl -L https://github.com/helmfile/helmfile/releases/latest/download/helmfile_linux_amd64.tar.gz -o helmfile.tar.gz
          tar -xzf helmfile.tar.gz
          sudo mv helmfile /usr/local/bin/helmfile
          helmfile --version

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Read Terraform outputs and configure kubeconfig
        id: tf
        working-directory: terraform
        run: |
          terraform init
          echo "CLUSTER_NAME=$(terraform output -raw cluster_name)" >> $GITHUB_ENV
          echo "REGION=$(terraform output -raw region)" >> $GITHUB_ENV
          echo "VPC_ID=$(terraform output -raw vpc_id)" >> $GITHUB_ENV
          echo "MYSQL_HOST=$(terraform output -raw mysql_endpoint | cut -d: -f1)" >> $GITHUB_ENV
          echo "MYSQL_DB=$(terraform output -raw mysql_database_name)" >> $GITHUB_ENV
          echo "MYSQL_USER=$(terraform output -raw mysql_username)" >> $GITHUB_ENV
          echo "MYSQL_PASSWORD=$(terraform output -raw mysql_password)" >> $GITHUB_ENV
          echo "POSTGRES_HOST=$(terraform output -raw postgres_endpoint | cut -d: -f1)" >> $GITHUB_ENV
          echo "POSTGRES_DB=$(terraform output -raw postgres_database_name)" >> $GITHUB_ENV
          echo "POSTGRES_USER=$(terraform output -raw postgres_username)" >> $GITHUB_ENV
          echo "POSTGRES_PASSWORD=$(terraform output -raw postgres_password)" >> $GITHUB_ENV
          echo "DYNAMODB_TABLE=$(terraform output -raw dynamodb_table_name)" >> $GITHUB_ENV

      - name: Configure kubeconfig
        run: aws eks update-kubeconfig --region "$REGION" --name "$CLUSTER_NAME"

      - name: Clone official retail app repository
        run: |
          mkdir -p vendor
          git clone https://github.com/aws-containers/retail-store-sample-app.git vendor/retail-store-sample-app

      - name: Install AWS Load Balancer Controller
        run: |
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            -n kube-system \
            --set clusterName="$CLUSTER_NAME" \
            --set region="$REGION" \
            --set vpcId="$VPC_ID" \
            --set serviceAccount.create=true \
            --set serviceAccount.name=aws-load-balancer-controller

      - name: Deploy retail app with Helmfile
        working-directory: helm
        run: |
          kubectl create namespace retail-app --dry-run=client -o yaml | kubectl apply -f -
          helmfile apply
          kubectl get pods -n retail-app
          kubectl get ingress -n retail-app
