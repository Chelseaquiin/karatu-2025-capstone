name: Terraform
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: terraform init

      - name: Import existing resources
        continue-on-error: true
        run: |
          terraform import aws_dynamodb_table.app_state bedrock-app-state
          terraform import aws_db_subnet_group.main bedrock-db-subnet-group
          terraform import aws_cloudwatch_log_group.eks_cluster /aws/eks/project-bedrock-cluster/cluster
          terraform import aws_iam_role.eks_cluster_role bedrock-eks-cluster-role
          terraform import aws_iam_role.eks_node_role bedrock-eks-node-role
          terraform import aws_iam_role.lambda_role bedrock-lambda-role
          terraform import aws_iam_user.developer bedrock-dev-view
          terraform import aws_s3_bucket.assets bedrock-assets-alt-soe-025-3792

      - name: Terraform Plan
        run: terraform plan

    #  - name: Terraform Apply
     #   if: github.event_name == 'push'
      #  run: terraform apply -auto-approve
